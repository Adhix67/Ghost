<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    /* Popup box */
    .popup {
      background: #0d0d0d;
      border: 2px solid #00ff41;
      border-radius: 8px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 0 30px #00ff41aa, 0 0 60px #00ff4155;
      animation: glitch 0.3s infinite alternate;
      max-width: 400px;
      width: 90%;
    }

    .popup h1 {
      color: #00ff41;
      font-size: 2rem;
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #00ff41;
    }

    .popup p {
      color: #aaa;
      font-size: 0.9rem;
      margin: 0 0 24px;
    }

    .popup button {
      background: #00ff41;
      color: #000;
      border: none;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    .popup button:hover {
      background: #00cc33;
    }

    /* Skull icon */
    .skull {
      font-size: 3rem;
      margin-bottom: 12px;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.15); }
    }

    @keyframes glitch {
      0%   { box-shadow: 0 0 30px #00ff41aa, 0 0 60px #00ff4155; }
      50%  { box-shadow: 2px 0 30px #ff004488, 0 0 60px #00ff4155; }
      100% { box-shadow: 0 0 30px #00ff41aa, -2px 0 60px #ff004488; }
    }
  </style>
</head>
<body>

  <p>Normal webpage content...</p>

  <div class="overlay" id="overlay">
    <div class="popup">
      <div class="skull">💀</div>
      <h1>You Are Hacked</h1>
      <p>Just kidding — this is a harmless demo popup!</p>
      <button onclick="document.getElementById('overlay').style.display='none'">Dismiss</button>
    </div>
  </div>

</body>
</html>
